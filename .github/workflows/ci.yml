name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Non-blocking for now: the codebase has a pre-existing lint backlog
      # (mostly prefer-inject/prefer-standalone + template a11y). Drop
      # continue-on-error once that's burned down to gate on lint.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      # ubuntu-latest ships google-chrome; the ChromeHeadlessCI launcher
      # (karma.conf.js) runs it sandbox-free for the runner.
      - name: Unit tests
        run: npm run test:ci
