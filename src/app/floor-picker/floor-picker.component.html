@if (state && state.floors.length > 1) {
  <div class="floor-picker tooltip">
    <span class="map-name">{{ state.mapName }}</span>
    <p-select
      appendTo="body"
      [options]="options"
      [ngModel]="state.selected"
      (onChange)="onChange($event.value)"
      optionLabel="label"
      optionValue="value"
      [style]="{width: '100%'}">
    </p-select>
  </div>
}
