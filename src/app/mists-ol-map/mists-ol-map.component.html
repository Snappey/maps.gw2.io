<div class="map-host" #mapHost></div>

<div #tooltipEl class="tooltip-overlay ol-marker-tooltip"></div>

<div class="layer-panel tooltip">
  <app-layer-options [layers]="mapLayers" (layerUpdated)="layerUpdated($event)"></app-layer-options>
  <p-button class="block mt-1" label="Custom Layers" icon="pi pi-plus" size="small" [text]="true"
    (onClick)="showUserLayers = true"></p-button>
</div>

<app-user-layer-manager [(visible)]="showUserLayers" [continentId]="2"></app-user-layer-manager>
