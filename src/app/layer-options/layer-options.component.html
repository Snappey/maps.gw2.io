<div class="flex flex-auto flex-column overflow-y-auto" style="max-height: 80vh;">
  <!-- Built-in map layers stay flat at the top. -->
  @for (layer of ungrouped; track layer.id) {
    <ng-container *ngTemplateOutlet="leafTpl; context: {$implicit: layer, depth: 0}"></ng-container>
  }
  <!-- Imported/custom layers nest under collapsible group headers. -->
  @for (group of tree; track group.key) {
    <ng-container *ngTemplateOutlet="groupTpl; context: {$implicit: group, depth: 0}"></ng-container>
  }
</div>

<ng-template #groupTpl let-group let-depth="depth">
  <div class="layer-row group-header flex align-items-center justify-content-between tooltip"
       [style.padding-left.px]="5 + depth * 12" (click)="toggleExpand(group)">
    <span class="flex align-items-center gap-1 text-left overflow-hidden">
      <i class="pi chevron" [class.pi-chevron-right]="!isExpanded(group)" [class.pi-chevron-down]="isExpanded(group)"></i>
      <span class="group-name">{{group.name}}</span>
      <small class="count">{{groupCount(group)}}</small>
    </span>
    <span class="flex align-self-center flex-none">
      <p-button [text]="true" size="small"
        [icon]="groupAllHidden(group) ? 'pi pi-eye-slash' : 'pi pi-eye'"
        pTooltip="Show / hide all" tooltipPosition="left" tooltipStyleClass="tooltip"
        (onClick)="toggleGroup(group, $event)"></p-button>
      <p-button [text]="true" size="small" severity="danger" icon="pi pi-trash"
        pTooltip="Remove" tooltipPosition="left" tooltipStyleClass="tooltip"
        (onClick)="removeGroup(group, $event)"></p-button>
    </span>
  </div>
  @if (isExpanded(group)) {
    @for (sub of group.groups; track sub.key) {
      <ng-container *ngTemplateOutlet="groupTpl; context: {$implicit: sub, depth: depth + 1}"></ng-container>
    }
    @for (layer of group.layers; track layer.id) {
      <ng-container *ngTemplateOutlet="leafTpl; context: {$implicit: layer, depth: depth + 1}"></ng-container>
    }
  }
</ng-template>

<ng-template #leafTpl let-layer let-depth="depth">
  <div class="layer-row flex align-items-center justify-content-between tooltip" [style.padding-left.px]="5 + depth * 12">
    <span class="flex text-left align-items-center overflow-hidden">
      <img class="mr-1 flex-none" [src]="layer.icon" width="18" height="18" alt="layer icon"/>
      <span class="leaf-name">{{layer.friendlyName}}</span>
    </span>
    <span class="align-self-center flex-none">
      <p-button
        [text]="true" size="small"
        [icon]="stateIcon(layer)"
        [pTooltip]="stateLabel(layer)" tooltipPosition="left" tooltipStyleClass="tooltip"
        (onClick)="onLayerToggle(layer)">
      </p-button>
    </span>
  </div>
</ng-template>
