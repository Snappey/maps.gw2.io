<div class="card">
  @if (markerType != 0) {
    <div class="formgrid">
      @for (field of fields | keyvalue; track field.key) {
        <div class="field">
          <label [for]="field">{{field.key}}</label>
          @if (field.value === 'string') {
            <input autofocus [(ngModel)]="results[field.key]" [id]="field" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full">
          }
        </div>
      }
      <div class="field">
        <button pButton type="button" label="Submit" class="p-button-success" (click)="submit()"></button>
      </div>
    </div>
  }
</div>
